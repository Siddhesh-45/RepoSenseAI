<!DOCTYPE html>

          font-variation-settings:

<body class="bg-surface-container-lowest text-on-surface font-body min-h-screen flex flex-col relative overflow-hidden">
<!-- Atmospheric Background (Matrix-style abstraction) -->
<div aria-hidden="true" class="absolute inset-0 pointer-events-none opacity-[0.03] flex justify-between z-0">
<div class="w-px h-full bg-gradient-to-b from-transparent via-primary to-transparent mx-8"></div>
<div class="w-px h-full bg-gradient-to-b from-transparent via-primary to-transparent mx-8 mt-32"></div>
<div class="w-px h-full bg-gradient-to-b from-transparent via-primary to-transparent mx-8 mt-12"></div>

<div class="w-px h-full bg-gradient-to-b from-transparent via-primary to-transparent mx-8 mt-24"></div>
<div class="w-px h-full bg-gradient-to-b from-transparent via-primary to-transparent mx-8 mt-48"></div>

<div class="w-px h-full bg-gradient-to-b from-transparent via-primary to-transparent mx-8 mt-56"></div>
</div>
<!-- Header / Context -->
<header class="w-full flex justify-between items-center px-6 py-6 z-10">
<div class="font-mono font-black text-xl tracking-tighter text-primary">RepoGraph</div>
<div class="font-mono text-xs text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[16px] text-on-surface-variant">link</span>
            github.com/project-neural/core
        </div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center z-10 px-4">
<!-- Animated Ring Area -->
<div class="relative w-64 h-64 flex items-center justify-center mb-12">
<!-- Glow Effect -->
<div class="absolute inset-0 rounded-full shadow-[0_0_60px_rgba(0,255,70,0.15)] bg-primary/5 backdrop-blur-[2px]"></div>
<!-- SVG Progress Ring -->
<svg class="w-full h-full transform -rotate-90" viewbox="0 0 100 100">
<!-- Background Circle -->
<circle class="text-surface-container-high" cx="50" cy="50" fill="none" r="45" stroke="currentColor" stroke-width="2"></circle>
<!-- Progress Circle -->
<circle class="text-primary drop-shadow-[0_0_10px_rgba(0,255,70,0.5)]" cx="50" cy="50" fill="none" r="45" stroke="currentColor" stroke-dasharray="283" stroke-dashoffset="56" stroke-linecap="round" stroke-width="2"></circle>
</svg>
<!-- Percentage Display -->
<div class="absolute flex flex-col items-center justify-center">
<span class="font-mono text-5xl font-bold text-on-surface tracking-tighter">80%</span>
<span class="font-mono text-xs text-primary mt-2 uppercase tracking-widest">Processing</span>
</div>
</div>
<!-- Terminal Log Box -->
<div class="w-full max-w-2xl bg-surface/80 backdrop-blur-xl rounded border-t border-primary/40 shadow-[0_20px_40px_rgba(0,0,0,0.5)] overflow-hidden">
<!-- Terminal Header -->
<div class="flex items-center px-4 py-2 bg-surface-container-low border-b border-surface-container-high">
<div class="flex gap-2 mr-4">
<div class="w-2.5 h-2.5 rounded-full bg-surface-container-highest"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-container-highest"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-container-highest"></div>
</div>
<div class="font-mono text-[10px] text-on-surface-variant uppercase tracking-widest flex-1 text-center pr-8">
                    Analysis Stream
                </div>
</div>
<!-- Terminal Content -->
<div class="p-6 font-mono text-sm leading-loose">
<div class="text-on-surface-variant">&gt; Cloning repository...</div>
<div class="text-on-surface-variant">&gt; Fetching file tree (247 files)</div>
<div class="text-on-surface-variant">&gt; Running AST parser on src/...</div>
<div class="text-on-surface-variant">&gt; Building dependency graph...</div>
<div class="text-on-surface">&gt; Sending to Claude for analysis...</div>
<div class="flex items-center text-primary mt-4 font-bold">
<span>&gt; Graph building in progress</span>
<span class="w-2 h-4 bg-primary ml-2 animate-pulse shadow-[0_0_8px_rgba(0,255,70,0.8)]"></span>
</div>
</div>
</div>
